name: Deploy GitHub Pages

on:
  # GitHub Pages 배포를 트리거하는 이벤트
  # main 브랜치에 push될 때만 실행 (Notion sync의 JSON 업데이트 포함)
  push:
    branches:
      - main
    # paths 필터로 불필요한 배포 방지 (선택적)
    # paths-ignore:
    #   - '**.md'
    #   - '.github/**'
  # 수동 실행
  workflow_dispatch:

# Node 24 강제 적용 (Node 20 deprecated 경고 해소)
# actions/checkout, actions/configure-pages 등이 아직 Node 24 빌드를
# 릴리즈하지 않았으므로 env var 방식이 현 시점의 올바른 해결책
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 배포 작업의 동시 실행 제어
    # 새 배포가 시작되면 진행 중인 배포를 취소하고 새 배포로 전환
    concurrency:
      group: github-pages
      cancel-in-progress: true
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2          # Node 24 compatible

      - name: Setup Pages
        uses: actions/configure-pages@v5        # v5: Node 24 지원 (v4 → v5 메이저 업)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: '.'    # 누락 복구: 기본값 _site/ 가 아닌 레포 루트를 배포

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5       # Node 24 compatible
